/* ───────── Reveal hook ───────── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            e.target.classList.add("in");
            io.unobserve(e.target);
          }
        });
      },
      { threshold: 0.12, rootMargin: "0px 0px -60px 0px" }
    );
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

/* ───────── Results — Before/After slider ───────── */
function BeforeAfter({ before, after, name, desc, singleImage, isFirst }) {
  const isSingle = Boolean(singleImage);
  const ref = useRef(null);
  const [pos, setPos] = useState(50);
  const draggingRef = useRef(false);

  const onMove = (clientX) => {
    if (!ref.current) return;
    const r = ref.current.getBoundingClientRect();
    const x = Math.max(0, Math.min(r.width, clientX - r.left));
    setPos((x / r.width) * 100);
  };

  useEffect(() => {
    const move = (e) => {
      if (!draggingRef.current) return;
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      onMove(cx);
    };
    const up = () => { draggingRef.current = false; };
    window.addEventListener("mousemove", move);
    window.addEventListener("touchmove", move, { passive: true });
    window.addEventListener("mouseup", up);
    window.addEventListener("touchend", up);
    return () => {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("touchmove", move);
      window.removeEventListener("mouseup", up);
      window.removeEventListener("touchend", up);
    };
  }, []);

  const start = (e) => {
    if (isSingle) return;
    draggingRef.current = true;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    onMove(cx);
  };

  if (isSingle) {
    return (
      <div className="result-card reveal single-card" ref={ref}>
        <img className="single-img" src={singleImage} alt={name} loading="lazy" decoding="async" />
        <div className="ba-foot">
          <div className="name">{name}</div>
          <div className="desc">{desc}</div>
        </div>
      </div>
    );
  }

  return (
    <div
      className={`result-card reveal${isFirst ? " first-card" : ""}`}
      ref={ref}
      style={{ "--clip": `${100 - pos}%`, "--handle": `${pos}%` }}
      onMouseDown={start}
      onTouchStart={start}
    >
      <div className="ba-img ba-after" style={{backgroundImage: `url(${after})`}}></div>
      <div className="ba-img ba-before" style={{backgroundImage: `url(${before})`}}></div>
      <span className="ba-label before">Antes</span>
      <span className="ba-label after">Depois</span>
      <div className="ba-handle"></div>
      <div className="ba-foot">
        <div className="name">{name}</div>
        <div className="desc">{desc}</div>
      </div>
    </div>
  );
}

function Testimonials() {
  const items = [
    {
      name: "Lucas M.", status: "online",
      msgs: [
        { t: "João, 6 meses depois eu não me reconheço mais cara 🔥", time: "09:42", me: false },
        { t: "Saí do sofá pro tatame. Perdi 11kg, ganhei foco no trabalho, e minha esposa não para de elogiar 😂", time: "09:42", me: false },
        { t: "Que orgulho mano. Disciplina venceu. 💪", time: "09:43", me: true },
      ],
    },
    {
      name: "Ana P.", status: "online",
      msgs: [
        { t: "Eu nunca tinha treinado na vida. Tinha medo de academia.", time: "18:12", me: false },
        { t: "Hoje treino 4x por semana, faço minhas aulas de defesa em casa e me sinto outra pessoa.", time: "18:13", me: false },
        { t: "Obrigada por nunca ter desistido de mim 🧡", time: "18:13", me: false },
      ],
    },
    {
      name: "Rafael C.", status: "online",
      msgs: [
        { t: "Coach, fiz o teste físico hoje", time: "07:21", me: false },
        { t: "Supino subiu 25kg em 4 meses. Corrida 5km saiu de 32min pra 24min.", time: "07:22", me: false },
        { t: "Sem milagre. Só método e consistência 🤝", time: "07:24", me: true },
      ],
    },
  ];

  const extended = [items[items.length - 1], ...items, items[0]];
  const [pos, setPos] = useState(1);
  const [anim, setAnim] = useState(true);
  const [dot, setDot] = useState(0);

  useEffect(() => {
    const id = setInterval(() => {
      setAnim(true);
      setPos(p => p + 1);
    }, 4500);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    if (pos === extended.length - 1) {
      setTimeout(() => { setAnim(false); setPos(1); }, 480);
    } else if (pos === 0) {
      setTimeout(() => { setAnim(false); setPos(items.length); }, 480);
    }
    const realIdx = ((pos - 1) % items.length + items.length) % items.length;
    setDot(realIdx);
  }, [pos]);

  return (
    <section className="section-pad bg-band" id="depoimentos">
      <div className="container">
        <div className="section-head reveal">
          <span className="eyebrow">Depoimentos reais</span>
          <h2 className="display">A transformação <span className="text-grad">não é exceção.</span> É padrão.</h2>
        </div>

        <div className="testimonials testimonials-desktop">
          {items.map((it, i) => <WaCard key={i} item={it} delay={i * 0.08} />)}
        </div>

        <div className="testimonials-carousel">
          <div
            className="carousel-track"
            style={{
              transform: `translateX(${-pos * 100}%)`,
              transition: anim ? "transform 0.48s cubic-bezier(0.25,0.46,0.45,0.94)" : "none",
            }}
          >
            {extended.map((it, i) => (
              <div className="carousel-slide" key={i}>
                <WaCard item={it} />
              </div>
            ))}
          </div>
          <div className="carousel-dots">
            {items.map((_, i) => (
              <span key={i} className={`carousel-dot${dot === i ? " active" : ""}`} />
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}
